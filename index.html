<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Lounge - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Learning Lounge - Admin</h1>
    <div class="buttons">
      <button id="editCatalog">Edit Catalog</button>
      <button id="addQuestion">Add Question</button>
    </div>
  </header>
  <main>
    <section id="subjects">
      <h2>Subjects</h2>
      <div id="subjects-grid"></div>
    </section>
    <section id="years" style="display: none;">
      <h2>Years</h2>
      <div id="years-list"></div>
    </section>
    <section id="examTypes" style="display: none;">
      <h2>Exam Types</h2>
      <div id="exam-types-list"></div>
    </section>
    <section id="questions" style="display: none;">
      <h2>Questions</h2>
      <div id="questions-list"></div>
    </section>
  </main>

  <!-- Edit Catalog Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Edit Catalog</h2>
      <form id="editForm">
        <label>Catalog Type:
          <select id="catalogType">
            <option value="subject">Subject</option>
            <option value="year">Year</option>
          </select>
        </label>
        <div id="editSubjectForm">
          <label>Subject ID: <input type="text" id="editSubjectId" placeholder="e.g., english"></label>
          <label>Subject Name: <input type="text" id="editSubjectName" placeholder="e.g., English Language"></label>
          <button type="button" id="saveSubject">Save Subject</button>
        </div>
        <div id="editYearForm" style="display: none;">
          <label>Year: <input type="text" id="editYearValue" placeholder="e.g., 2024"></label>
          <button type="button" id="saveYear">Save Year</button>
        </div>
        <div id="editQuestionsForm" style="display: none;">
          <label>Subject ID: <input type="text" id="editQuestionSubject" placeholder="e.g., english"></label>
          <label>Year: <input type="text" id="editQuestionYear" placeholder="e.g., 2024"></label>
          <button type="button" id="saveQuestions">Save Questions</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Question Modal -->
  <div id="addQuestionModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Add Question</h2>
      <form id="questionForm">
        <label>Subject:
          <select id="questionSubject" required>
            <option value="">Select Subject</option>
          </select>
        </label>
        <label>Year:
          <input type="text" id="questionYear" placeholder="e.g., 2024" required>
        </label>
        <label>Exam Type:
          <select id="questionExam" required>
            <option value="WAEC">WAEC</option>
            <option value="NECO">NECO</option>
          </select>
        </label>
        <label>Question Text:
          <textarea id="questionText" rows="3" required></textarea>
        </label>
        <label>Option A: <input type="text" id="questionOptionA" required></label>
        <label>Option B: <input type="text" id="questionOptionB" required></label>
        <label>Option C: <input type="text" id="questionOptionC" required></label>
        <label>Option D: <input type="text" id="questionOptionD" required></label>
        <label>Correct Answer (A/B/C/D):
          <select id="questionAnswer" required>
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>
        </label>
        <label>Explanation:
          <textarea id="questionExplanation" rows="3"></textarea>
        </label>
        <button type="submit">Add Question</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
